name: gitleaks

# Secret scanning via the gitleaks CLI (license-free). PR + nightly.
# Allow-list in .gitleaks.toml (cosign.pub PEM blocks). ADDITIVE. Doctrine v11 LOCKED 749/14/163 locked_at c7c0ba17
# Note: gitleaks-action@v2 now requires a paid GITLEAKS_LICENSE; we run the OSS binary directly instead.

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: '7 1 * * *'   # nightly 01:07 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Gitleaks scan
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --redact \
            --verbose \
            --exit-code 1
